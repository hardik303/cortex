services:
  postgres:
    image: postgres:16-alpine
    container_name: screenpipe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: screenpipe
      POSTGRES_PASSWORD: screenpipe
      POSTGRES_DB: screenpipe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U screenpipe -d screenpipe"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
